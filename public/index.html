<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hizz Swap | ADA Tap Board</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="noise"></div>
      <section class="desk">
        <header class="topbar">
          <div class="brand-block">
            <span class="brand-kicker">Hizz / Charli3</span>
            <h1>ADA/USD Tap Board</h1>
          </div>
          <div class="topbar-meta">
            <div class="live-pill" id="livePill">
              <span class="live-dot"></span>
              <strong id="statusMode">Booting</strong>
              <span id="statusText">Preparing oracle feed.</span>
            </div>
            <div class="price-stack">
              <span class="price-label">Current price</span>
              <strong class="price-value" id="currentPrice">--</strong>
              <span class="price-subline" id="priceSubline">Waiting for first pull.</span>
            </div>
          </div>
        </header>

        <section class="arena">
          <div class="arena-head">
            <div>
              <p class="arena-kicker">Charli3 pull oracle / 1s refresh</p>
              <div class="arena-line">
                <span class="arena-market" id="marketName">ADA / USD</span>
                <span class="arena-badge" id="readinessBadge">booting</span>
              </div>
            </div>
            <div class="arena-stats">
              <div class="stat-chip">
                <span>Oracle source</span>
                <strong id="sourceLabel">--</strong>
              </div>
              <div class="stat-chip">
                <span>Last pull</span>
                <strong id="lastPullLabel">--</strong>
              </div>
            </div>
          </div>

          <div class="chart-stage">
            <div class="grid-backdrop"></div>
            <div class="current-line" id="currentLine"></div>
            <div class="current-tag" id="currentTag">--</div>
            <svg class="chart-svg" id="chartSvg" viewBox="0 0 1200 560" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="rgba(17, 215, 255, 0.28)"></stop>
                  <stop offset="72%" stop-color="rgba(17, 215, 255, 0.04)"></stop>
                  <stop offset="100%" stop-color="rgba(17, 215, 255, 0)"></stop>
                </linearGradient>
              </defs>
              <path id="chartFill" class="chart-fill"></path>
              <path id="chartLine" class="chart-line"></path>
            </svg>
            <div class="projection-layer" id="projectionLayer"></div>
          </div>

          <footer class="status-strip">
            <div class="strip-card">
              <span>Selected box</span>
              <strong id="selectionSummary">Waiting for price ladder...</strong>
            </div>
            <div class="strip-card">
              <span>Oracle note</span>
              <strong id="oracleNote">--</strong>
            </div>
            <div class="strip-card">
              <span>Endpoint</span>
              <strong id="endpointLabel">/api/ada-usd</strong>
            </div>
          </footer>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
